<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Robert Elkjer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elkjer Music: Contemplative Jazz Piano, Brass Sheet Music, Whistling</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0d100e;
            font-family: "Inter", sans-serif;
            color: #0c1d12;
            text-align: center;
        }

        /* ── Header ── */
        header {
            position: relative;
            width: 100%;
            height: 220px;
            overflow: hidden;
        }

        header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        header h1 {
            position: absolute;
            bottom: 0;
            width: 100%;
            margin: 0;
            padding: 16px 0;
            background-color: rgba(12, 29, 18, 0.85);
            color: #ceffe0;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        /* ── Main ── */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 16px 0;
        }

        /* ── Grid: 6 equal columns so bottom 2 can be perfectly centered ── */
        .nav-images {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Top row: each card spans 2 of 6 columns */
        .nav-images a:nth-child(1) { grid-column: 1 / 3; }
        .nav-images a:nth-child(2) { grid-column: 3 / 5; }
        .nav-images a:nth-child(3) { grid-column: 5 / 7; }

        /* Bottom row: 2 cards centered — 1 empty column on each side */
        .nav-images a:nth-child(4) { grid-column: 2 / 4; }
        .nav-images a:nth-child(5) { grid-column: 4 / 6; }

        .nav-images a {
            display: flex;
            flex-direction: column;
            text-decoration: none;
            width: 100%;
            border: 2px solid #2d6d45;
            background-color: #ffffff;
            transition: background-color 0.2s;
            align-items: center;
        }

        .nav-images a:hover {
            background-color: #204e32;
        }

        .nav-images a:hover p {
            color: #ceffe0;
        }

        .nav-images a:focus {
            outline: 3px solid #07120b;
            outline-offset: 3px;
        }

        .nav-images img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        .nav-images p {
            margin: 0;
            padding: 16px 10px;
            font-weight: 600;
            font-size: 1.1rem;
            color: #0c1d12;
            transition: color 0.2s;
        }

        /* ── Tablet (2 per row) ── */
        @media (max-width: 900px) {
            .nav-images {
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-images a:nth-child(1),
            .nav-images a:nth-child(2),
            .nav-images a:nth-child(3),
            .nav-images a:nth-child(4),
            .nav-images a:nth-child(5) {
                grid-column: auto;
            }
        }

        /* ── Mobile (1 per row) ── */
        @media (max-width: 500px) {
            .nav-images {
                grid-template-columns: 1fr;
            }
        }

        /* ── Announcement ── */
        .announcement {
            background-color: #204e32;
            color: #ceffe0;
            padding: 14px 20px;
            margin: 40px auto;
            width: 60%;
            max-width: 520px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <header>
        <img src="img/CityDesktop6c.jpg" alt="City skyline at dusk">
        <h1>Welcome to Elkjer Music</h1>
    </header>

    <main>
        <nav aria-label="Site sections">
            <div class="nav-images">
                <a href="cd-files.html">
                    <img src="img/brassensemble.png" alt="Recordings">
                    <p>Recordings</p>
                </a>

                <a href="sheetmusic.html">
                    <img src="img/sheetm.jpg" alt="Sheet Music">
                    <p>Sheet Music</p>
                </a>

                <a href="whistling.html">
                    <img src="img/whistlekid3.jpg" alt="Whistling">
                    <p>Whistling</p>
                </a>

                <a href="Ebio.html">
                    <img src="img/elkjer.jpg" alt="About Robert Elkjer">
                    <p>About Robert Elkjer</p>
                </a>

                <a href="EJlinks.html">
                    <img src="img/brassensemble.png" alt="Teaching Links">
                    <p>Teaching Links</p>
                </a>
            </div>
        </nav>

        <p class="announcement">
            <strong>New:</strong> SQUARE CREDIT CARD payment option (email us what music you want)
        </p>
    </main>

</body>
</html>
